<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class="calculator">
    <p class="final-result"></p>
    <div class="buttons">
    <button onclick="
        updateCalculation(1);
    ">1</button>
    <button onclick="
       updateCalculation('2');
    ">2</button>

    <button onclick="
        updateCalculation('3');
    ">3</button>
    <button class="color" onclick="
       updateCalculation('+');
    ">+</button>
   
    <button onclick="
       updateCalculation('4');
    ">4</button>

    <button onclick="
       updateCalculation('5');
    ">5</button>

    <button onclick="
        updateCalculation('6');
    ">6</button>
    <button class="color" onclick="
        updateCalculation('-');
    ">-</button>
    <button onclick="
        updateCalculation('7');
    ">7</button>

    <button onclick="
       updateCalculation('8');
    ">8</button>

    <button onclick="
        updateCalculation('9');
    ">9</button>
    <button class="color" onclick="
        updateCalculation('*');
    ">*</button>
    <button onclick="
       updateCalculation('0');
    ">0</button>

    <button onclick="
        updateCalculation('.');
    ">.</button>
    <button onclick="
       result();
    ">=</button>
    <button class="color" onclick="
        updateCalculation('/');
    ">/</button>

    <button class="clear-button" onclick="
        clear();
    ">Clear ⌫</button>
    </div>
    </div>

    <script src="calculator.js"></script>
</body>
</html>
